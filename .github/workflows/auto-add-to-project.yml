name: Auto-add to Project

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/Schrottsocke/projects/${{ vars.PROJECT_NUMBER }}
          github-token: ${{ secrets.PROJECT_TOKEN }}
