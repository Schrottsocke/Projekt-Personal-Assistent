name: Flutter

on:
  push:
    branches: [main, "claude/**", "fix/**"]
    paths: ["app/**"]
  pull_request:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test
