name: Flutter

on:
  push:
    branches: [main, "claude/**", "fix/**"]
    paths: ["app/**"]
  pull_request:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  build-apk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: flutter-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
