name: Coverage Report

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=html:coverage-html \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json \
            -v --tb=short 2>&1 | tee coverage-output.txt

      - name: Coverage Summary
        if: always()
        run: |
          echo "## Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '^(TOTAL|Name|src/|api/|----)' coverage-output.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Extract total coverage percentage
          TOTAL=$(grep '^TOTAL' coverage-output.txt | awk '{print $NF}' | tr -d '%')
          if [ -n "$TOTAL" ]; then
            echo "**Total Coverage: ${TOTAL}%**" >> "$GITHUB_STEP_SUMMARY"
            if [ "$TOTAL" -ge 80 ]; then
              echo "Status: PASS (>= 80%)" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$TOTAL" -ge 50 ]; then
              echo "Status: WARNING (>= 50%, target: 80%)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Status: NEEDS IMPROVEMENT (< 50%)" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 30

      - name: Upload coverage XML
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Coverage gate (informational)
        if: always()
        run: |
          TOTAL=$(grep '^TOTAL' coverage-output.txt | awk '{print $NF}' | tr -d '%')
          echo "Current coverage: ${TOTAL}%"
          if [ -n "$TOTAL" ] && [ "$TOTAL" -lt 50 ]; then
            echo "::warning::Coverage is below 50% (${TOTAL}%). Target: 80%."
          fi
