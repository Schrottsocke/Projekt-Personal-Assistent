name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Nur ausgeben, keine Issues/PRs markieren oder schliessen'
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: write

  concurrency:
    group: stale-issues
      cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          debug-only: ${{ inputs.dry_run == true }}
          stale-issue-message: >
            Dieses Issue ist seit 60 Tagen inaktiv und wurde als `stale` markiert.
            Bitte kommentiere, falls es noch relevant ist – ansonsten wird es
            nach 90 weiteren Tagen automatisch geschlossen.
          stale-pr-message: >
            Dieser PR ist seit 60 Tagen inaktiv und wurde als `stale` markiert.
            Bitte kommentiere oder aktualisiere den Branch, falls er noch relevant ist.
          close-issue-message: >
            Dieses Issue wurde nach insgesamt 150 Tagen Inaktivität geschlossen.
            Bei Bedarf gerne wieder öffnen.
          close-pr-message: >
            Dieser PR wurde nach insgesamt 150 Tagen Inaktivität geschlossen.
          days-before-stale: 60
          days-before-close: 90
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'P0-critical,P1-high,blocked'
          exempt-pr-labels: 'P0-critical,P1-high,blocked'
          operations-per-run: 30
