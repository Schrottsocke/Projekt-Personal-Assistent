name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had activity in the last 60 days. It will be closed in 30 days
            if no further activity occurs. If this issue is still relevant,
            please comment to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had activity in the last 60 days. It will be closed in
            30 days if no further activity occurs.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen
            if it is still relevant.
          close-pr-message: >
            This pull request has been closed due to inactivity.
          days-before-stale: 60
          days-before-close: 30
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'P0-critical,P1-high'
          exempt-pr-labels: 'P0-critical,P1-high'
          operations-per-run: 30
