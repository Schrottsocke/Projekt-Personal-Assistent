name: Triage Report

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Nur ausgeben, kein Issue erstellen/updaten'
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: read
  contents: read

  concurrency:
    group: triage-report
      cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure triage label exists
        if: ${{ !inputs.dry_run }}
        run: gh label create triage --repo "$REPO" --description "Auto-generated triage reports" --color "0E8A16" || true

      - name: Collect triage data
        id: collect
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          THIRTY_DAYS_AGO=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)
          SEVEN_DAYS_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)

          # Stale issues (no update in 30+ days)
          STALE=$(gh issue list --repo "$REPO" --state open \
            --json number,title,updatedAt \
            --jq "[.[] | select(.updatedAt < \"$THIRTY_DAYS_AGO\")] | length")
          STALE_LIST=$(gh issue list --repo "$REPO" --state open \
            --json number,title,updatedAt \
            --jq "[.[] | select(.updatedAt < \"$THIRTY_DAYS_AGO\")] | .[:10] | .[] | \"- #\(.number) \(.title) (last: \(.updatedAt[:10]))\"")

          # Issues without labels
          UNLABELED=$(gh issue list --repo "$REPO" --state open \
            --json number,title,labels \
            --jq '[.[] | select(.labels | length == 0)] | length')
          UNLABELED_LIST=$(gh issue list --repo "$REPO" --state open \
            --json number,title,labels \
            --jq '[.[] | select(.labels | length == 0)] | .[:10] | .[] | "- #\(.number) \(.title)"')

          # Issues without area label
          NO_AREA=$(gh issue list --repo "$REPO" --state open \
            --json number,title,labels \
            --jq '[.[] | select([.labels[].name] | any(startswith("area/")) | not)] | length')
          NO_AREA_LIST=$(gh issue list --repo "$REPO" --state open \
            --json number,title,labels \
            --jq '[.[] | select([.labels[].name] | any(startswith("area/")) | not)] | .[:10] | .[] | "- #\(.number) \(.title)"')

          # PRs without reviews
          UNREVIEWED=$(gh pr list --repo "$REPO" --state open \
            --json number,title,reviewDecision \
            --jq '[.[] | select(.reviewDecision == "" or .reviewDecision == null)] | length')
          UNREVIEWED_LIST=$(gh pr list --repo "$REPO" --state open \
            --json number,title,reviewDecision \
            --jq '[.[] | select(.reviewDecision == "" or .reviewDecision == null)] | .[:10] | .[] | "- #\(.number) \(.title)"')

          # PRs older than 7 days without merge
          OLD_PRS=$(gh pr list --repo "$REPO" --state open \
            --json number,title,createdAt \
            --jq "[.[] | select(.createdAt < \"$SEVEN_DAYS_AGO\")] | length")
          OLD_PRS_LIST=$(gh pr list --repo "$REPO" --state open \
            --json number,title,createdAt \
            --jq "[.[] | select(.createdAt < \"$SEVEN_DAYS_AGO\")] | .[:10] | .[] | \"- #\(.number) \(.title) (opened: \(.createdAt[:10]))\"")

          # Totals
          TOTAL_OPEN=$(gh issue list --repo "$REPO" --state open --json number --jq 'length')
          TOTAL_PRS=$(gh pr list --repo "$REPO" --state open --json number --jq 'length')

          # Priority breakdown
          P0=$(gh issue list --repo "$REPO" --state open --label P0-critical --json number --jq 'length')
          P1=$(gh issue list --repo "$REPO" --state open --label P1-high --json number --jq 'length')
          P2=$(gh issue list --repo "$REPO" --state open --label P2-medium --json number --jq 'length')

          # Build report
          cat > /tmp/triage-body.md << REPORT_EOF
          ## Triage Report – ${TODAY}

          ### Summary
          | Metric | Count |
          |--------|-------|
          | Open Issues | ${TOTAL_OPEN} |
          | Open PRs | ${TOTAL_PRS} |
          | P0-critical | ${P0} |
          | P1-high | ${P1} |
          | P2-medium | ${P2} |
          | Stale (30+ days) | ${STALE} |
          | Unlabeled | ${UNLABELED} |
          | Without area label | ${NO_AREA} |
          | PRs without review | ${UNREVIEWED} |
          | PRs older than 7 days | ${OLD_PRS} |

          ### Stale Issues (30+ days inactive)
          ${STALE_LIST:-_None_}

          ### Issues Without Labels
          ${UNLABELED_LIST:-_None_}

          ### Issues Without Area Label
          ${NO_AREA_LIST:-_None_}

          ### PRs Without Review
          ${UNREVIEWED_LIST:-_None_}

          ### PRs Older Than 7 Days
          ${OLD_PRS_LIST:-_None_}

          ### Recommended Actions
          $(if [ "$P0" -gt 0 ]; then echo "- **P0-critical Issues vorhanden** – sofort bearbeiten"; fi)
          $(if [ "$UNLABELED" -gt 0 ]; then echo "- **$UNLABELED Issues ohne Label** – Labels vergeben (Priority + Area)"; fi)
          $(if [ "$NO_AREA" -gt 0 ]; then echo "- **$NO_AREA Issues ohne Area-Label** – Bereich zuordnen"; fi)
          $(if [ "$STALE" -gt 0 ]; then echo "- **$STALE stale Issues** – schliessen oder reaktivieren"; fi)
          $(if [ "$OLD_PRS" -gt 0 ]; then echo "- **$OLD_PRS PRs aelter als 7 Tage** – reviewen oder schliessen"; fi)
          $(if [ "$UNREVIEWED" -gt 0 ]; then echo "- **$UNREVIEWED PRs ohne Review** – Review anfordern"; fi)
          $(if [ "$P0" -eq 0 ] && [ "$UNLABELED" -eq 0 ] && [ "$STALE" -eq 0 ] && [ "$UNREVIEWED" -eq 0 ]; then echo "- Alles sauber! Keine dringenden Aktionen noetig."; fi)

          ---
          _Generated by [triage workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          REPORT_EOF

          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Create or update triage issue
        if: ${{ !inputs.dry_run }}
        run: |
          TODAY="${{ steps.collect.outputs.today }}"
          TITLE="[Triage] Weekly Report ${TODAY}"

          # Find existing open triage issue
          EXISTING=$(gh issue list --repo "$REPO" --state open \
            --label triage --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" \
              --body-file /tmp/triage-body.md
            echo "Updated existing triage issue #${EXISTING}"
          else
            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --body-file /tmp/triage-body.md \
              --label triage
            echo "Created new triage issue"
          fi

      - name: Dry run output
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN – Triage Report ==="
          cat /tmp/triage-body.md
          echo "=== Kein Issue erstellt/aktualisiert ==="
