name: CI

on:
  push:
    branches: [main, "claude/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Detect which areas changed ───────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'main.py'
              - 'src/**'
              - 'api/**'
              - '!api/static/**'
              - 'config/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'ruff.toml'
              - 'pytest.ini'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'requirements*.txt'
              - 'main.py'
              - 'src/**'
              - 'api/**'
              - 'config/**'

  # ── Python lint (only on Python changes) ─────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
      - name: Security lint (bandit rules via ruff)
        run: ruff check --select S --exit-zero .
        continue-on-error: true

  # ── Docker build (only on Docker/source changes) ─────────────
  docker:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t personal-assistant:ci .

  # ── Python tests (only on Python changes) ────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-report=html:coverage-html \
            --cov-fail-under=50 \
            -v 2>&1 | tee coverage-output.txt
      - name: Print coverage summary
        if: always()
        run: |
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          grep -E '^(TOTAL|Name|src/|api/|----)' coverage-output.txt >> "$GITHUB_STEP_SUMMARY" || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 14

  # ── E2E Smoke Tests (only on Python/web changes) ──────────────
  e2e:
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.python == 'true'
    continue-on-error: true  # Don't block merges while E2E stabilizes
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Start API server
        run: |
          cp .env.example .env.test
          echo 'API_SECRET_KEY=test-secret-key-for-ci-minimum-32-chars-long' >> .env.test
          echo 'API_PASSWORD_TAAKE=testpassword123' >> .env.test
          echo 'DATABASE_URL=sqlite:///data/test_e2e.db' >> .env.test
          ENV_FILE=.env.test python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DOTENV_PATH: .env.test
      - name: Run E2E smoke tests
        run: |
          python -m pytest tests/e2e/ -v --tb=short 2>&1 | tee e2e-output.txt || true
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_TEST_USER: taake
          E2E_TEST_PASSWORD: testpassword123
      - name: E2E test summary
        if: always()
        run: |
          echo "## E2E Smoke Tests" >> "$GITHUB_STEP_SUMMARY"
          tail -20 e2e-output.txt >> "$GITHUB_STEP_SUMMARY" || true
