name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deploy via webhook
        env:
          WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.HOSTINGER_WEBHOOK_SECRET }}
        run: |
          # Build HMAC signature matching webhook_deployer.py expectations
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$NF}')

          echo "=== Triggering deploy ==="
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            --max-time 120 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: push" \
            "$WEBHOOK_URL" \
            -d "$PAYLOAD")

          RESPONSE=$(cat /tmp/deploy_response.txt)
          echo "HTTP $HTTP_CODE: $RESPONSE"

          if [ "$HTTP_CODE" = "202" ]; then
            echo "=== Deploy triggered successfully ==="
          else
            echo "::error::Deploy trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Wait for deploy to complete
        run: sleep 30

      - name: Verify deploy
        env:
          HEALTH_URL: ${{ secrets.HOSTINGER_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::HOSTINGER_HEALTH_URL not set, skipping verification"
            exit 0
          fi

          echo "=== Health check ==="
          HEALTH=$(curl -sf --max-time 15 "$HEALTH_URL" 2>&1) || {
            echo "::error::Health check failed"
            echo "$HEALTH"
            exit 1
          }
          echo "$HEALTH"
          echo "=== Deploy verified ==="
