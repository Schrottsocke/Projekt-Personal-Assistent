name: Autopilot Reminders

on:
  schedule:
    - cron: '30 7 * * 1'  # Montag 07:30 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Nur ausgeben, keine Kommentare/Labels setzen'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

  concurrency:
    group: autopilot-reminders
      cancel-in-progress: false

jobs:
  reminders:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Remind unassigned P0 issues
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          ONE_DAY_AGO=$(date -u -d '1 day ago' +%Y-%m-%dT%H:%M:%SZ)

          P0_JSON=$(gh issue list --repo "$REPO" --state open --label P0-critical \
            --json number,title,assignees,createdAt || echo '[]')

          echo "$P0_JSON" | jq -r --arg cutoff "$ONE_DAY_AGO" '
            .[] | select(.createdAt < $cutoff and (.assignees | length == 0))
            | .number
          ' | while read -r ISSUE_NUM; do
            if [ -n "$ISSUE_NUM" ]; then
              gh issue comment "$ISSUE_NUM" --repo "$REPO" \
                --body "**Autopilot-Reminder:** Dieses P0-critical Issue ist seit >24h offen und hat keinen Assignee. Bitte zeitnah zuweisen und bearbeiten."
              echo "Reminded on P0 issue #${ISSUE_NUM}"
            fi
          done

      - name: Label PRs without review
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          THREE_DAYS_AGO=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)

          PRS_JSON=$(gh pr list --repo "$REPO" --state open \
            --json number,createdAt,reviewDecision,labels || echo '[]')

          echo "$PRS_JSON" | jq -r --arg cutoff "$THREE_DAYS_AGO" '
            .[]
            | select(
                .createdAt < $cutoff
                and (.reviewDecision == "" or .reviewDecision == null)
                and ([.labels[].name] | any(. == "needs-review") | not)
              )
            | .number
          ' | while read -r PR_NUM; do
            if [ -n "$PR_NUM" ]; then
              gh pr edit "$PR_NUM" --repo "$REPO" --add-label "needs-review"
              echo "Added needs-review label to PR #${PR_NUM}"
            fi
          done

      - name: Dry run output
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          echo "=== DRY RUN – Autopilot Reminders ==="
          echo ""

          ONE_DAY_AGO=$(date -u -d '1 day ago' +%Y-%m-%dT%H:%M:%SZ)
          THREE_DAYS_AGO=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)

          echo "--- Erkannt: P0-Issues ohne Assignee (>24h) ---"
          P0_TARGETS=$(gh issue list --repo "$REPO" --state open --label P0-critical \
            --json number,title,assignees,createdAt \
            --jq "[.[] | select(.createdAt < \"$ONE_DAY_AGO\" and (.assignees | length == 0)) | \"#\(.number) \(.title)\"] | length" || echo "0")
          gh issue list --repo "$REPO" --state open --label P0-critical \
            --json number,title,assignees,createdAt \
            --jq ".[] | select(.createdAt < \"$ONE_DAY_AGO\" and (.assignees | length == 0)) | \"  #\(.number) \(.title)\"" || true
          echo "-> Wuerde Reminder-Kommentar schreiben auf: ${P0_TARGETS} Issue(s)"
          echo "-> UNTERDRUECKT (dry_run)"
          echo ""

          echo "--- Erkannt: PRs ohne Review (>3 Tage) ---"
          PR_TARGETS=$(gh pr list --repo "$REPO" --state open \
            --json number,title,createdAt,reviewDecision,labels \
            --jq "[.[] | select(.createdAt < \"$THREE_DAYS_AGO\" and (.reviewDecision == \"\" or .reviewDecision == null) and ([.labels[].name] | any(. == \"needs-review\") | not))] | length" || echo "0")
          gh pr list --repo "$REPO" --state open \
            --json number,title,createdAt,reviewDecision,labels \
            --jq ".[] | select(.createdAt < \"$THREE_DAYS_AGO\" and (.reviewDecision == \"\" or .reviewDecision == null) and ([.labels[].name] | any(. == \"needs-review\") | not)) | \"  #\(.number) \(.title)\"" || true
          echo "-> Wuerde Label 'needs-review' setzen auf: ${PR_TARGETS} PR(s)"
          echo "-> UNTERDRUECKT (dry_run)"
          echo ""

          echo "=== Zusammenfassung ==="
          echo "Erkannte Aktionen: $((P0_TARGETS + PR_TARGETS))"
          echo "Ausgefuehrte Aktionen: 0 (dry_run)"
          echo "=== Keine Kommentare geschrieben, keine Labels gesetzt ==="
