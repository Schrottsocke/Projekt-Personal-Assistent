# Logrotate config for DualMind Personal Assistant
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/dualmind
/home/deploy/Projekt-Personal-Assistent/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 deploy deploy
    sharedscripts
    postrotate
        systemctl restart personal-assistant personal-assistant-api 2>/dev/null || true
    endscript
}
