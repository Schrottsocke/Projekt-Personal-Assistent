# Nginx Reverse Proxy for DualMind Personal Assistant API
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/dualmind-api
# Enable:  sudo ln -s /etc/nginx/sites-available/dualmind-api /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx

# =============================================================================
# HTTP → HTTPS redirect
# Redirects all HTTP traffic to HTTPS and serves ACME challenges for certbot.
# =============================================================================
server {
    listen 80;
    server_name dualmind.cloud www.dualmind.cloud;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt challenge (required for certificate issuance & renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# =============================================================================
# HTTPS – main server block
# Requires SSL certificate from: sudo bash deploy/setup_ssl.sh dualmind.cloud
# =============================================================================
server {
    listen 443 ssl http2;
    server_name dualmind.cloud www.dualmind.cloud;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/dualmind.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dualmind.cloud/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

