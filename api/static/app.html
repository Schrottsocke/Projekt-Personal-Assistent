<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DualMind</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#7c4dff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DualMind">
  <link rel="apple-touch-icon" href="/static/favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div id="app">
    <header class="app-header hidden">
      <h1>DualMind</h1>
    </header>

    <main id="view-container"></main>

    <nav class="bottom-nav hidden">
      <a class="nav-item" data-route="#/dashboard" href="#/dashboard">
        <span class="nav-icon material-symbols-outlined">home</span>
        <span>Home</span>
      </a>
      <a class="nav-item" data-route="#/shopping" href="#/shopping">
        <span class="nav-icon material-symbols-outlined">shopping_cart</span>
        <span>Einkauf</span>
      </a>
      <a class="nav-item" data-route="#/recipes" href="#/recipes">
        <span class="nav-icon material-symbols-outlined">restaurant</span>
        <span>Rezepte</span>
      </a>
      <a class="nav-item" data-route="#/chat" href="#/chat">
        <span class="nav-icon material-symbols-outlined">chat_bubble</span>
        <span>Chat</span>
      </a>
      <a class="nav-item" data-route="#/profile" href="#/profile">
        <span class="nav-icon material-symbols-outlined">person</span>
        <span>Profil</span>
      </a>
    </nav>
  </div>

  <!-- Utilities -->
  <script src="/static/js/utils.js"></script>
  <!-- API Client -->
  <script src="/static/js/api.js"></script>
  <!-- Router -->
  <script src="/static/js/router.js"></script>
  <!-- Views -->
  <script src="/static/js/views/login.js"></script>
  <script src="/static/js/views/dashboard.js"></script>
  <script src="/static/js/views/shopping.js"></script>
  <script src="/static/js/views/recipes.js"></script>
  <script src="/static/js/views/chat.js"></script>
  <script src="/static/js/views/profile.js"></script>
  <script src="/static/js/views/calendar.js"></script>
  <script src="/static/js/views/tasks.js"></script>
  <script src="/static/js/views/mealplan.js"></script>
  <script src="/static/js/views/drive.js"></script>
  <script src="/static/js/views/issues.js"></script>
  <!-- App Init -->
  <script src="/static/js/app.js"></script>
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/app/sw.js', { scope: '/app' });
    }
  </script>
</body>
</html>
