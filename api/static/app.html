<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DualMind</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=__CACHE_VERSION__">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#7c4dff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DualMind">
  <link rel="apple-touch-icon" href="/static/favicon.svg?v=__CACHE_VERSION__">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="/static/css/app.css?v=__CACHE_VERSION__">
</head>
<body>
  <div id="app">
    <header class="app-header hidden">
      <h1>DualMind</h1>
      <div class="header-actions">
        <button class="header-btn notification-bell hidden" onclick="window.location.hash='#/unified-inbox'" title="Inbox">
          <span class="material-symbols-outlined">notifications</span>
          <span id="notification-badge" class="notification-badge hidden">0</span>
        </button>
        <button class="header-btn header-search-btn" onclick="CommandPalette.open()" title="Suche (Ctrl+K)">
          <span class="material-symbols-outlined">search</span>
        </button>
      </div>
    </header>

    <main id="view-container"></main>

    <nav class="bottom-nav hidden" id="bottom-nav"></nav>
  </div>

  <!-- Utilities -->
  <script src="/static/js/utils.js?v=__CACHE_VERSION__"></script>
  <!-- API Client -->
  <script src="/static/js/api.js?v=__CACHE_VERSION__"></script>
  <!-- Offline Queue -->
  <script src="/static/js/offlineQueue.js?v=__CACHE_VERSION__"></script>
  <!-- Components -->
  <script src="/static/js/components/ingredientPreview.js?v=__CACHE_VERSION__"></script>
  <!-- Router -->
  <script src="/static/js/router.js?v=__CACHE_VERSION__"></script>
  <!-- Views -->
  <script src="/static/js/views/login.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/dashboard.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/shopping.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/recipes.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/chat.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/profile.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/calendar.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/tasks.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/mealplan.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/drive.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/issues.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/shifts.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/notifications.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/focus.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/templates.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/documents.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/contacts.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/followups.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/automation.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/inbox.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/unifiedInbox.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/weather.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/memory.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/mobility.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/commandPalette.js?v=__CACHE_VERSION__"></script>
  <script src="/static/js/views/quickCapture.js?v=__CACHE_VERSION__"></script>
  <!-- App Init -->
  <script src="/static/js/app.js?v=__CACHE_VERSION__"></script>
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/app/sw.js', { scope: '/app' });
    }
  </script>
</body>
</html>
