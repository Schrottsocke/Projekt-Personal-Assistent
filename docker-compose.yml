services:
  bot:
    build: .
    image: personal-assistant:latest
    container_name: personal-assistant-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistente Daten (DB, Tokens, Memory)
      - ./data:/app/data
      - ./logs:/app/logs
      # Google Credentials (read-only)
      - ./config/google_credentials.json:/app/config/google_credentials.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    image: personal-assistant:latest
    container_name: personal-assistant-api
    restart: unless-stopped
    command: ["python", "api/api_main.py"]
    depends_on:
      bot:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/google_credentials.json:/app/config/google_credentials.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  webhook:
    image: personal-assistant:latest
    container_name: personal-assistant-webhook
    restart: unless-stopped
    command: ["python", "deploy/webhook_deployer.py"]
    depends_on:
      bot:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "9000:9000"
    networks:
      - webhook
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  internal:
    driver: bridge
  webhook:
    driver: bridge
