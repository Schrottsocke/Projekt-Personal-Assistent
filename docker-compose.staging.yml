services:
  bot:
    build: .
    image: personal-assistant:staging
    container_name: pa-staging-bot
    restart: unless-stopped
    env_file:
      - .env.staging
    volumes:
      - ./data/staging:/app/data
      - ./logs/staging:/app/logs
      - ./config/google_credentials.json:/app/config/google_credentials.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENV=staging
    networks:
      - staging
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    image: personal-assistant:staging
    container_name: pa-staging-api
    restart: unless-stopped
    command: ["python", "api/api_main.py"]
    depends_on:
      bot:
        condition: service_started
    env_file:
      - .env.staging
    volumes:
      - ./data/staging:/app/data
      - ./logs/staging:/app/logs
      - ./config/google_credentials.json:/app/config/google_credentials.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENV=staging
    ports:
      - "8001:8000"
    networks:
      - staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  staging:
    driver: bridge
